updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "e2e"
      - "server"
      - "web"
    schedule:
      interval: "cron"
      cronjob: "0 6 * * Mon%2"
    groups:
      npm:
        applies-to: "version-updates"
        update-types:
          - "patch"
  - package-ecosystem: "docker"
    directories:
      - "server"
      - "web"
    schedule:
      interval: "cron"
      cronjob: "0 6 * * Mon%2"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "cron"
      cronjob: "0 6 * * Mon%2"
